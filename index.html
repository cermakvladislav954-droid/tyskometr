<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технічні роботи</title>
  <!-- Підключаємо шрифт Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1581092580495-c59aa6b420d1?auto=format&fit=crop&w=1650&q=80') no-repeat center center fixed;
      background-size: cover;
    }

    .message {
      background: rgba(0, 0, 0, 0.5);
      padding: 25px 50px;
      border-radius: 15px;
      font-size: 2.5em;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="message">
    Технічні роботи з 20:00 по 21:30
  </div>
</body>
</html>
